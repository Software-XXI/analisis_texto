# Configuración de H2 en memoria
spring.datasource.url=jdbc:h2:mem:reviewsdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2 (Para ver los datos en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esto es necesario para que la consola funcione con Spring Security o frames
spring.h2.console.settings.web-allow-others=true